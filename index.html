<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎮 인생 NPC 대사 생성기</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #ffe9f3 0%, #fff6d6 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow: hidden;
    }

    .container {
      width: 100%;
      max-width: 430px;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(12px);
      border-radius: 30px;
      padding: 28px 22px;
      box-shadow: 0 10px 35px rgba(0,0,0,0.12);
      text-align: center;
      position: relative;
    }

    .sparkle {
      position: absolute;
      font-size: 22px;
      animation: float 3s infinite ease-in-out;
    }

    .sparkle:nth-child(1){ top: 18px; left: 20px; }
    .sparkle:nth-child(2){ top: 20px; right: 24px; animation-delay: 1s; }
    .sparkle:nth-child(3){ bottom: 20px; left: 28px; animation-delay: 2s; }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
      color: #ff5e9c;
    }

    .subtitle {
      font-size: 0.98rem;
      color: #666;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .npc-box {
      background: linear-gradient(135deg, #fff0f7, #fffdf2);
      border: 3px solid #ffd2e8;
      border-radius: 24px;
      padding: 26px 20px;
      margin-bottom: 24px;
      min-height: 210px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: 0.3s ease;
    }

    .npc {
      font-size: 4rem;
      margin-bottom: 14px;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }

    .quote {
      font-size: 1.12rem;
      line-height: 1.7;
      color: #444;
      font-weight: 700;
      word-break: keep-all;
    }

    .tag {
      margin-top: 16px;
      display: inline-block;
      padding: 8px 14px;
      background: #ffe27a;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 700;
      color: #6d4f00;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 18px;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      background: linear-gradient(135deg, #ff77b7, #ffb36b);
      color: white;
      box-shadow: 0 8px 18px rgba(255, 125, 171, 0.35);
      transition: transform 0.15s ease;
    }

    button:active {
      transform: scale(0.96);
    }

    .footer {
      margin-top: 18px;
      font-size: 0.82rem;
      color: #999;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="sparkle">✨</div>
    <div class="sparkle">🌙</div>
    <div class="sparkle">⭐</div>

    <h1>🎮 인생 NPC 대사 생성기</h1>
    <div class="subtitle">
      버튼을 누르면<br>
      어딘가 수상한 NPC가 현실 조언을 해줍니다 👀
    </div>

    <div class="npc-box" id="npcBox">
      <div class="npc" id="npcEmoji">🧙</div>
      <div class="quote" id="quote">
        청년이여...<br>
        배달앱을 삭제하면 통장에 평화가 찾아오리라 🍜
      </div>
      <div class="tag" id="tag">💸 소비의 현자</div>
    </div>

    <button onclick="generateNPC()">
      🎲 NPC 대사 뽑기
    </button>

    <div class="footer">
      친구들이랑 같이 눌러보면<br>
      이상하게 하나쯤은 팩폭임 😭
    </div>
  </div>

  <script>
    const npcLines = [
      {
        emoji: '🧙',
        tag: '💸 소비의 현자',
        text: '청년이여...\n쿠팡 장바구니를 비울 때가 왔다 📦'
      },
      {
        emoji: '🧌',
        tag: '📱 SNS 늪의 수호자',
        text: '그대는 릴스를 켠 순간\n이미 1시간을 잃었다 ⏳'
      },
      {
        emoji: '🦝',
        tag: '☕ 야근 마을 주민',
        text: '오늘의 커피는\n내일의 수면을 제물로 바친다 ☕'
      },
      {
        emoji: '👵',
        tag: '💔 연애 고인물',
        text: '답장이 느린 자는...\n대개 마음도 느리니라 📵'
      },
      {
        emoji: '🐸',
        tag: '🛌 게으름 철학자',
        text: '낮잠은 도망이 아니다...\n현실과의 전략적 거리두기다 😌'
      },
      {
        emoji: '🧛',
        tag: '🌙 새벽 감성 상인',
        text: '새벽 2시에 듣는 노래는\n대체로 인생을 망친다 🎧'
      },
      {
        emoji: '🐱',
        tag: '🍜 자취촌 주민',
        text: '냉장고를 열었지만...\n먹을 것은 없었다 🥲'
      },
      {
        emoji: '🤖',
        tag: '📊 직장인 분석 AI',
        text: '회의가 길어질수록\n아무도 책임지지 않는다 📈'
      },
      {
        emoji: '🦆',
        tag: '💬 인간관계 전문가',
        text: '읽씹보다 무서운 것은\n칼답 뒤 단답이다 😭'
      },
      {
        emoji: '🧸',
        tag: '🍕 행복 연구가',
        text: '진정한 행복은\n배달 도착 1분 전에 시작된다 🍕'
      },
      {
        emoji: '🧙‍♀️',
        tag: '💳 카드값 예언가',
        text: '이번 달 카드값은\n과거의 네가 남긴 저주다 💀'
      },
      {
        emoji: '🐧',
        tag: '🫠 사회생활 생존자',
        text: '출근은 익숙해져도\n월요일은 익숙해지지 않는다 📅'
      }
    ];

    function generateNPC() {
      const random = npcLines[Math.floor(Math.random() * npcLines.length)];

      document.getElementById('npcEmoji').textContent = random.emoji;
      document.getElementById('quote').innerHTML = random.text.replace(/\n/g, '<br>');
      document.getElementById('tag').textContent = random.tag;

      const box = document.getElementById('npcBox');
      box.style.transform = 'scale(0.97)';

      setTimeout(() => {
        box.style.transform = 'scale(1)';
      }, 120);
    }
  </script>
</body>
</html>
